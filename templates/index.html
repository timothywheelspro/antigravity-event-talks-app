<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes</title>
    <meta name="description" content="Stay updated with the latest BigQuery release notes.">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1><i class="fa-solid fa-cloud"></i> BigQuery Release Notes</h1>
                <p>Stay up to date with the latest features, changes, and announcements.</p>
            </div>
            <button id="refresh-btn" class="refresh-btn">
                <i class="fa-solid fa-rotate-right spinner-icon"></i>
                <span>Refresh</span>
            </button>
        </header>

        <main>
            <div id="loading-state" class="loading-state hidden">
                <div class="spinner"></div>
                <p>Fetching the latest updates...</p>
            </div>
            <div id="error-state" class="error-state hidden">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <p id="error-message">Failed to load release notes.</p>
            </div>
            <div id="notes-container" class="notes-container">
                <!-- Notes will be injected here -->
            </div>
        </main>
    </div>

    <!-- Twitter Composer Modal -->
    <div id="twitter-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Compose Tweet</h2>
                <button id="close-modal-btn" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="twitter-preview">
                    <div class="twitter-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="twitter-post-content">
                        <div class="twitter-user-info">
                            <span class="twitter-name">You</span>
                            <span class="twitter-handle">@your_handle</span>
                        </div>
                        <textarea id="tweet-textarea" class="tweet-textarea" rows="4"></textarea>
                        <div class="twitter-link-preview">
                            <div class="link-preview-title">BigQuery Release Notes</div>
                            <div class="link-preview-url" id="tweet-link-url">docs.cloud.google.com</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <span id="tweet-char-count" class="char-count">280</span>
                <button id="post-tweet-btn" class="post-tweet-btn"><i class="fa-brands fa-twitter"></i> Post to Twitter</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
